name: Docs

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write # mike pushes the built site to the gh-pages branch

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      # WeasyPrint (the PDF renderer behind mkdocs-with-pdf) needs Pango at runtime.
      - name: Install PDF system libraries
        run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libpangoft2-1.0-0

      # Pull requests: build only, to verify the docs compile. The base config is
      # built --strict to validate links; the PDF is built without --strict (the
      # with-pdf plugin turns mkdocs's --strict into a hard fail on WeasyPrint's
      # benign cross-page anchor warnings, while a real render failure still raises).
      - name: Build (verify)
        if: github.event_name == 'pull_request'
        run: |
          uv run --extra docs mkdocs build --strict
          uv run --extra docs mkdocs build -f mkdocs-pdf.yaml

      - name: Configure git
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Pushes to main: publish the development version.
      - name: Deploy dev docs
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
        run: uv run --extra docs mike deploy --push -F mkdocs-pdf.yaml dev

      # Release tags: publish the numbered version and update the latest alias.
      - name: Deploy release docs
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          uv run --extra docs mike deploy --push -F mkdocs-pdf.yaml --update-aliases "$VERSION" latest
          uv run --extra docs mike set-default --push latest
