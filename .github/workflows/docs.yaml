name: Docs

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write # mike pushes the built site to the gh-pages branch

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Pull requests: build only, to verify the docs compile.
      - name: Build (verify)
        if: github.event_name == 'pull_request'
        run: uv run --extra docs mkdocs build --strict

      - name: Configure git
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Pushes to main: publish the development version.
      - name: Deploy dev docs
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
        run: uv run --extra docs mike deploy --push dev

      # Release tags: publish the numbered version and update the latest alias.
      - name: Deploy release docs
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          uv run --extra docs mike deploy --push --update-aliases "$VERSION" latest
          uv run --extra docs mike set-default --push latest
