name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write # gh-deploy pushes the built site to the gh-pages branch

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      # mkdocs-exporter renders the PDF through headless Chromium (via Playwright).
      - name: Install PDF browser
        run: uv run --extra docs playwright install --with-deps chromium

      # Pull requests: build only, to verify the docs compile. The base config is
      # built --strict to validate links; the PDF is built with the exporter config
      # and checked for completeness (a wide element silently dropping pages was the
      # failure mode of the old WeasyPrint manual, #250).
      - name: Build (verify)
        if: github.event_name == 'pull_request'
        run: |
          uv run --extra docs mkdocs build --strict
          uv run --extra docs mkdocs build -f mkdocs-pdf.yml
          uv run --extra docs python pdf/check_manual.py site/pdf/smacc-manual.pdf

      - name: Configure git
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Pushes to main: build the site (with the PDF manual) and publish it to the
      # gh-pages branch. The site is unversioned — one current copy; older docs are
      # the PDF manual attached to each GitHub release.
      - name: Deploy docs
        if: github.event_name == 'push'
        run: uv run --extra docs mkdocs gh-deploy --force -f mkdocs-pdf.yml
