name: Docs

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write # mike pushes the built site to the gh-pages branch

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      # mkdocs-exporter renders the PDF through headless Chromium (via Playwright).
      - name: Install PDF browser
        run: uv run --extra docs playwright install --with-deps chromium

      # Pull requests: build only, to verify the docs compile. The base config is
      # built --strict to validate links; the PDF is built with the exporter config
      # and checked for completeness (a wide element silently dropping pages was the
      # failure mode of the old WeasyPrint manual, #250).
      - name: Build (verify)
        if: github.event_name == 'pull_request'
        run: |
          uv run --extra docs mkdocs build --strict
          uv run --extra docs mkdocs build -f mkdocs-pdf.yml
          uv run --extra docs python pdf/check_manual.py site/pdf/smacc-manual.pdf

      - name: Configure git
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Pushes to main: publish the development version.
      - name: Deploy dev docs
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
        run: uv run --extra docs mike deploy --push -F mkdocs-pdf.yml dev

      # Release tags. A final tag (v0.1.0) publishes a numbered version and moves
      # the `latest` alias + default. A pre-release tag (a `-` suffix, e.g.
      # v1.0.0-rc.1) is a release candidate: route it to the `dev` site and leave
      # `latest`/the default untouched, so the version switcher never points users
      # at an unreleased build.
      - name: Deploy release docs
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            uv run --extra docs mike deploy --push -F mkdocs-pdf.yml dev
          else
            VERSION="${GITHUB_REF_NAME#v}"
            uv run --extra docs mike deploy --push -F mkdocs-pdf.yml --update-aliases "$VERSION" latest
            uv run --extra docs mike set-default --push latest
          fi
