name: Docs

on:
  push:
    branches: [main]
    # Stable release tags publish the live site; see the deploy gate below.
    tags: ["v*"]
  pull_request:
    branches: [main]

# Least privilege for the build job; the deploy job widens to what Pages needs.
permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      # Quarto is a standalone binary (Typst PDF engine bundled); no plugin stack or
      # system libraries, unlike the old mkdocs-exporter + headless-Chromium path.
      - uses: quarto-dev/quarto-actions/setup@v2

      # Render the HTML site and the single-file PDF manual from docs/, on every PR
      # and push, so docs breakage is caught early. Four guards replace
      # `mkdocs build --strict`: check_manual catches a renderer silently truncating
      # the PDF (#250); check_links validates every internal cross-link and heading
      # anchor in the HTML site (the main migration footgun, #259); check_pdf_links
      # catches cross-chapter links that go dead in the PDF (#262); check_pdf_fonts
      # catches body/code text silently falling back off IBM Plex (#283).
      - name: Render and check docs
        run: |
          # Stamp the cover with the release this build represents (#261). This unscoped
          # render stamps both the PDF and the HTML book cover; the HTML copy reaches Pages
          # only on a stable tag (a dev string never deploys). A tagged
          # build shows the tag (v0.1.2, v0.1.2-rc.1, … — the full literal, which always
          # equals "v" + smacc.__version__ per the build-exe tag check); every other ref is
          # a rolling dev build, carrying the commit as build metadata (v0.1.2-dev+<sha>,
          # the +<sha> being PEP 440 / semver local-version syntax — the same <sha> the dev
          # binary is stamped with). Read the version from the source literal, not via
          # `uv run`/import — this lean job never syncs the smacc dependency tree. Mirrored
          # in release.yml's build-pdf job (which ships the per-release PDF); keep in step.
          version=$(sed -n 's/^__version__ = "\(.*\)"/\1/p' src/smacc/__init__.py)
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            release="v$version"
          else
            release="v$version-dev+${GITHUB_SHA:0:7}"
          fi
          # Fail the build if Typst can't resolve a font: that is only a *warning*, so
          # the PDF would otherwise ship in a fallback face and no other check would
          # notice (the reference tables lost their condensed cut this way, #268).
          # set -o pipefail so a hard `quarto render` failure isn't masked by the tee —
          # the default GitHub Actions shell is `bash -e` (errexit only, NO pipefail).
          # The grep tracks Typst's current warning wording; revisit if Quarto is bumped.
          set -o pipefail
          quarto render docs -M subtitle="User manual · $release" 2>&1 | tee render.log
          if grep -qi 'unknown font family' render.log; then
            echo "::error::Typst could not resolve a font; the PDF fell back to a default face. Check docs/typst-preamble.typ and docs/assets/fonts."
            exit 1
          fi
          uv run --extra docs python scripts/check_manual.py docs/_book/SMACC-manual.pdf
          uv run python scripts/check_links.py docs/_book
          uv run --extra docs python scripts/check_pdf_links.py docs/_book/SMACC-manual.pdf
          uv run --extra docs python scripts/check_pdf_fonts.py docs/_book/SMACC-manual.pdf

      # Only a stable release (a `vX.Y.Z` tag with no pre-release suffix) publishes the
      # live site, so it always reflects the current stable version — never a dev or
      # pre-release build. The PDF manual for every release (incl. dev/pre-release) is
      # attached to that release by release.yml instead.
      - name: Upload Pages artifact
        if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_book

  # Publish to GitHub Pages via the official Actions deployment (no gh-pages branch).
  # Requires the repo's Pages source to be set to "GitHub Actions" (Settings -> Pages).
  deploy:
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
