name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - name: Build SMACC.exe
        run: uv run pyinstaller entry.py --name SMACC --onefile --noconsole --icon src/smacc/assets/icon.ico --add-data "src/smacc/assets/icon.png;smacc/assets" --add-data "src/smacc/assets/cues;smacc/assets/cues"
      - name: Attach exe to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SMACC.exe
