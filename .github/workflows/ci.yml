name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Ruff lint
        run: uv run --extra dev ruff check .
      - name: Ruff format check
        run: uv run --extra dev ruff format --check .
      # Markdown formatter (the docs counterpart to ruff). `mdformat .` crawls the
      # tree; the .mdformat.toml exclude scopes it (incl. the in-tree .venv this
      # step creates). The exclude needs Python 3.13, which is why this waited on
      # #168. --extra docs is where mdformat + its gfm/frontmatter plugins live.
      - name: Markdown format check
        run: uv run --extra docs mdformat --check .
      # mne, matplotlib and pyqtgraph ship no py.typed, so they add no type
      # information even though --extra dev now installs them (they are core
      # dependencies); ignore_missing_imports covers them either way.
      - name: Type check
        run: uv run --extra dev mypy

  test:
    # windows-2022 mirrors the release build (release.yml) — same OS, Python
    # (3.13, via .python-version), and locked deps — so CI exercises exactly what
    # gets frozen into SMACC.exe. windows-latest runs alongside as a
    # forward-compatibility canary (it tracks the newest hosted image, e.g. the
    # VS-2026 line), so toolchain/runtime drift is caught here rather than at
    # release time. fail-fast is off so one image's result doesn't mask the other.
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      # GUI tests run with no display via Qt's "offscreen" platform. conftest.py
      # also sets this, but declaring it here keeps the intent visible in CI and
      # holds even if a future test imports Qt before conftest runs.
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      # The EEG stack (mne/pyqtgraph) is a core dependency now, so the EEG
      # Annotator tests (#136) always run — no extra needed.
      - name: Run tests
        run: uv run --extra dev pytest --cov=smacc --cov-report=xml --cov-report=term-missing
      # Smoke-test the docs screenshot harness so a renamed widget or removed window
      # fails CI instead of silently rotting the committed images. Offscreen
      # (QT_QPA_PLATFORM above) into a temp dir, in the base env that mirrors the
      # shipped exe; regenerate the real shots locally on the native platform.
      - name: Smoke-test the screenshot harness
        if: matrix.os == 'windows-2022'
        run: uv run python scripts/screenshots.py --headless --out ${{ runner.temp }}/shots
      - name: Upload coverage to Codecov
        # Upload only from the release-mirror runner, and only when the tests passed
        # (`success()` — an explicit `if:` otherwise overrides the implicit
        # run-on-success). One upload keeps the coverage signal and the Codecov gate
        # (see codecov.yml) stable rather than double-counting across matrix legs.
        # Strict: an upload error fails the build rather than passing silently.
        if: success() && matrix.os == 'windows-2022'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: true
