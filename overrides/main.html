{% extends "base.html" %}

<!--
  Shown by Material's version switcher (mike) whenever the visitor is not on the
  latest released version — i.e. the rolling `dev` build. The link redirects to
  the site root, which mike forwards to the current `latest` stable version.
-->
{% block outdated %}
  You're viewing the development version of SMACC, which is unstable and may
  change at any time.
  <a href="{{ '../' ~ base_url }}">
    <strong>Go to the latest stable version.</strong>
  </a>
{% endblock %}
