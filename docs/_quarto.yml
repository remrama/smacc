# Quarto Book project for the SMACC docs (#259). One source tree renders both the
# HTML site (deployed to GitHub Pages) and the single-file PDF manual (Typst), with
# no plugin stack or system libraries. The project root is docs/ so Quarto only ever
# scans the documentation tree — never README.md / AGENTS.md / the rest of the repo.
#
#   quarto preview docs      # live HTML site while writing
#   quarto render docs       # build both HTML and PDF into docs/_book/

project:
  type: book
  output-dir: _book

book:
  title: SMACC
  # Populates the HTML pages' <meta name="description">. The llms.txt summary is read
  # from a SEPARATE path (website: description below) — Quarto does not share the two,
  # so the same string lives in both blocks (#294).
  description: "Sleep Manipulation And Communication Clickything (SMACC) is a control panel for running dream engineering studies."
  # CI OVERRIDES this on the cover via `-M subtitle=…` (docs.yml and release.yml, #261),
  # e.g. "User manual · v0.1.2". `-M` replaces — it does not append — so the "User manual"
  # prefix is duplicated in those two workflows; editing this default alone does NOT change
  # the CI cover (keep the three in sync). A local `quarto render` keeps this default.
  subtitle: User manual
  author: Remington Mallett
  favicon: assets/icon.png
  site-url: https://remrama.github.io/smacc/
  repo-url: https://github.com/remrama/smacc
  search: true
  # Base name for the single-file PDF; it lands at docs/_book/SMACC-manual.pdf, is
  # served on the (stable) site, and is attached to every release as SMACC-manual.pdf.
  output-file: SMACC-manual
  # Surface Quarto's built-in "Download PDF" control in the sidebar, pointing at the
  # site-hosted (stable) copy.
  downloads: [pdf]
  chapters:
    - index.md
    - part: Getting started
      chapters:
        - installation.md
        - smacc-files.md
    - part: Running a session
      chapters:
        - usage.md
        - audio-cues.md
        - visual.md
        - biocals.md
        - surveys.md
        - intercom.md
        - triggers.md
    - part: Devices, volume & timing
      chapters:
        - audio.md
        - devices.md
        - latency.md
    - part: After the night
      chapters:
        - eeg-annotator.md
        - troubleshooting.md
    - part: Reference
      chapters:
        - reference/index.md
        - reference/settings-file.md
        - reference/preferences-file.md
        - reference/session-log.md
        - reference/bids-export.md
        - reference/annotations-file.md
  # Back matter. Appendices render after the numbered parts and are lettered
  # (Appendix A, B, …): a reader-facing glossary and release notes, then the
  # developer guide and credits.
  appendices:
    - glossary.md
    - release-notes.md
    - contributing.md
    - about.md

# A book is internally a Quarto website, but it does NOT re-expose website-level options
# under book:/project:/format — so `llms-txt` (the only switch that emits llms.txt + the
# per-page *.llms.md twins) must live in a top-level website: block (#294). Verified: the
# same flag placed under book:, project:, or format.html is silently ignored. This block
# does NOT create a second site — it merges into the one HTML site rendered to _book/.
# Keep llms-txt here; "tidying" it into book: would silently stop the llms output.
website:
  # Drives the llms.txt summary line; see the book: description above (the two don't share).
  description: "Sleep Manipulation And Communication Clickything (SMACC) is a control panel for running dream engineering studies."
  llms-txt: true

format:
  html:
    # Light is listed first, so it is the default-on-load scheme (most screenshots are
    # light captures); the appearance toggle still offers the dark "lights barely up"
    # theme. Each scheme = Bootswatch base + the shared font faces + the SMACC theme.
    theme:
      light: [pulse, smacc-fonts.scss, smacc.scss]
      dark: [darkly, smacc-fonts.scss, smacc-dark.scss]
    # Syntax highlighting is a separate axis from the Sass theme; pair it to the scheme.
    highlight-style:
      light: github
      dark: github-dark
    # Number the chapters and sections so the HTML site and the PDF manual read as one
    # numbered book (and figure numbers line up with their sections). Parts stay
    # unnumbered; the preface and appendices are handled by Quarto's book template.
    number-sections: true
  typst:
    papersize: a4
    number-sections: true
    # Let Typst size table columns to their content (auto) instead of honouring Pandoc's
    # dash-derived percentage widths. Those widths starve a narrow column (e.g. a 1.7%
    # "Version" column next to a wide "Changes" column), and long unbreakable tokens — code
    # spans in mono, single-word headers — overflow and overlap the neighbouring column.
    tbl-colwidths: false
    # Bundled brand fonts (the .ttf under assets/fonts, found via a project-relative
    # font-paths — never absolute, and never also TYPST_FONT_PATHS). mainfont/codefont
    # match each font's internal family name. Headings (and the Condensed table cut)
    # are set in typst-preamble.typ.
    mainfont: "IBM Plex Sans"
    codefont: "IBM Plex Mono"
    font-paths: ["assets/fonts"]
    fontsize: 10.5pt
    linestretch: 1.4
    margin: { x: 2.4cm, top: 2.6cm, bottom: 2.4cm }
    include-in-header: typst-preamble.typ
