site_name: SMACC
site_description: Sleep Manipulation And Communication Clickything — a clickable interface for running sleep-related experiments.
site_url: https://remrama.github.io/smacc/
repo_url: https://github.com/remrama/smacc
repo_name: remrama/smacc
docs_dir: docs

theme:
  name: material
  custom_dir: overrides  # version-warning banner; see overrides/main.html (#191, #247)
  logo: assets/icon.png
  favicon: assets/icon.png
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

extra_css:
  - assets/extra.css

extra:
  generator: false
  version:
    provider: mike
    default: latest

markdown_extensions:
  - admonition
  - attr_list  # enables the { .md-button } download buttons on the home/install pages
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - Getting started:
    - Installation: installation.md
    - SMACC files: smacc-files.md
  - Running a session:
    - Overview: usage.md
    - Audio cues: audio-cues.md
    - Visual cues: visual.md
    - Biocals: biocals.md
    - Dream reports & surveys: surveys.md
    - Intercom & chat: intercom.md
    - Markers & port codes: triggers.md
  - Devices & routing:
    - Audio routing: audio.md
    - Compatible devices: devices.md
  - Volume & latency: latency.md
  - EEG Annotator: eeg-annotator.md
  - Troubleshooting: troubleshooting.md
  - Release notes: release-notes.md
  - Reference:
    - File formats: reference/index.md
    - SMACC file (.smacc): reference/settings-file.md
    - Preferences file: reference/preferences-file.md
    - Session log: reference/session-log.md
    - BIDS export: reference/bids-export.md
    - Annotations sidecar: reference/annotations-file.md
  - Contributing: contributing.md
