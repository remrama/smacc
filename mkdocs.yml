site_name: SMACC
site_description: Sleep Manipulation And Communication Clickything — a clickable interface for running sleep-related experiments.
site_url: https://remrama.github.io/smacc/
repo_url: https://github.com/remrama/smacc
repo_name: remrama/smacc
docs_dir: docs

theme:
  name: material
  features:
    - navigation.instant
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

extra:
  version:
    provider: mike

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Contributing: contributing.md
