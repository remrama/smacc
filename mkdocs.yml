site_name: SMACC
site_description: Sleep Manipulation And Communication Clickything — a clickable interface for running sleep-related experiments.
site_url: https://remrama.github.io/smacc/
repo_url: https://github.com/remrama/smacc
repo_name: remrama/smacc
docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  logo: assets/icon.png
  favicon: assets/icon.png
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

extra_css:
  - assets/extra.css

extra:
  generator: false
  version:
    provider: mike
    default: latest

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Audio & routing: audio.md
  - Visual cues: visual.md
  - Devices: devices.md
  - Triggers & port codes: triggers.md
  - Reference:
    - File formats: reference/index.md
    - Settings file (.smacc): reference/settings-file.md
    - Preferences file: reference/preferences-file.md
    - Session log: reference/session-log.md
    - BIDS export: reference/bids-export.md
  - Contributing: contributing.md
