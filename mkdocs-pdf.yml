# Docs config for the single-file PDF manual (#230, #250).
#
# This inherits everything from mkdocs.yml and renders the whole site to one PDF
# with mkdocs-exporter: each page is printed through headless Chromium + Paged.js
# and the pages are aggregated into a single document. It lives in a separate
# config on purpose so an ordinary `mkdocs build` / `mkdocs serve` stays light and
# never launches a browser.
#
# Why mkdocs-exporter (Chromium) instead of mkdocs-with-pdf (WeasyPrint): WeasyPrint
# silently truncated the manual at a wide table, mis-rendered admonition icons, and
# needs Pango system libraries (so it only built in CI). Chromium ships via
# Playwright as a plain dependency with no system libraries, builds on Windows and
# in CI alike, and renders Material's tables + admonitions faithfully (#250).
#
# CI builds with this file (`mkdocs build -f mkdocs-pdf.yml`) after installing the
# browser (`playwright install chromium`); the PDF is published alongside the site
# at `…/pdf/smacc-manual.pdf`.
INHERIT: mkdocs.yml

# Inject the SMACC version into the cover + footer (PDF build only).
hooks:
  - pdf/hooks.py

plugins:
  - search
  - exporter:
      formats:
        pdf:
          concurrency: 4
          # Render the cover + footer styles defined for print.
          stylesheets:
            - pdf/print.css
          # The cover is attached to the home page only (docs/index.md front
          # matter), so it renders once at the front and nested pages don't carry
          # a copy whose relative asset paths wouldn't resolve.
          # Combine every page into one manual; keep the cover on page 1 only.
          aggregator:
            enabled: true
            output: pdf/smacc-manual.pdf
            covers: limits
          browser:
            timeout: 120000
